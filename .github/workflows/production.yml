name: Autonomous Music Production & Deployment

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *' # Every day at midnight
  workflow_dispatch:
    inputs:
      input_midi:
        description: 'Path to input MIDI file'
        required: true
        default: 'hymnmania_src/hymn_remaker/test_input/Emmanuel.mid'
      vocal_track:
        description: 'URL or Path to vocal track'
        required: false
      genre:
        description: 'Target genre (psytrance or house)'
        required: true
        default: 'psytrance'
      continuous:
        description: 'Enable continuous mode (random input selection)'
        type: boolean
        required: false
        default: false
      density:
        description: 'Euclidean Density (1-8)'
        required: false
        default: '5'
      octaves:
        description: 'Octave Jump Frequency (0-4)'
        required: false
        default: '2'
      variant:
        description: 'Gallop Variant (classic, triplet, rolling)'
        required: false
        default: 'classic'
      run_training:
        description: 'Run style model training before generation'
        type: boolean
        required: false
        default: false

jobs:
  produce_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fluidsynth fluid-soundfont-gm librubberband-dev

      - name: Install Node Dependencies
        run: npm install

      - name: Install Python Dependencies
        run: pip install -r requirements.txt demucs torchcodec

      - name: Run Style Model Training
        if: github.event.inputs.run_training == 'true' || github.event_name == 'schedule'
        run: npx ts-node src/analysis/training_engine.ts

      - name: Run Production Pipeline
        run: |
          INPUT_MIDI="${{ github.event.inputs.input_midi }}"
          GENRE="${{ github.event.inputs.genre || 'psytrance' }}"
          CONTINUOUS="${{ github.event.inputs.continuous || (github.event_name == 'schedule' && 'true' || 'false') }}"
          DENSITY="${{ github.event.inputs.density || '5' }}"
          OCTAVES="${{ github.event.inputs.octaves || '2' }}"
          VARIANT="${{ github.event.inputs.variant || 'classic' }}"

          ARGS=""
          if [ "$CONTINUOUS" = "true" ]; then
            ARGS="--continuous"
          elif [ ! -z "$INPUT_MIDI" ]; then
            ARGS="$INPUT_MIDI"
          else
            ARGS="hymnmania_src/hymn_remaker/test_input/Emmanuel.mid"
          fi

          VOCAL_ARG=""
          if [ ! -z "${{ github.event.inputs.vocal_track }}" ]; then
            VOCAL_ARG="--vocal ${{ github.event.inputs.vocal_track }}"
          fi

          npx ts-node src/pipeline.ts $ARGS pipeline/output/latest $VOCAL_ARG --genre "$GENRE" --density "$DENSITY" --octaves "$OCTAVES" --variant "$VARIANT"

      - name: Commit and Push Generated Assets
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add pipeline/output/latest published/ models/
          git commit -m "Auto-publish: New track generation & model update [$(date +'%Y-%m-%d %H:%M')] [skip ci]" || echo "No changes to commit"
          git push

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
