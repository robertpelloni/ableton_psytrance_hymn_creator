<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hymnmania Pipeline Control</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: #eee; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: #2a2a2a; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        h1 { color: #00d2ff; text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #444; background: #333; color: #fff; box-sizing: border-box; }
        button { background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%); color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        .config-section { margin-top: 20px; padding: 15px; background: #333; border-radius: 6px; border: 1px solid #444; }
        .config-section h3 { margin-top: 0; font-size: 14px; color: #aaa; }
        .status { margin-top: 20px; padding: 15px; border-radius: 6px; background: #333; border-left: 4px solid #00d2ff; }
        .job-monitor { margin-top: 20px; padding: 15px; border-radius: 6px; background: #222; border: 1px solid #444; }
        .job-status { font-weight: bold; }
        .status-completed { color: #4caf50; }
        .status-in_progress { color: #ff9800; }
        .status-queued { color: #2196f3; }
        .output { margin-top: 20px; display: none; }
        .track { background: #383838; padding: 15px; margin-bottom: 10px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; }
        .track a { color: #00d2ff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hymnmania Pipeline</h1>
        <p>Transform traditional hymns into Modern Psytrance and House.</p>

        <div class="form-group">
            <label for="midiSelect">Select Hymn MIDI</label>
            <select id="midiSelect">
                <option value="">-- Random (Continuous Mode) --</option>
                <option value="hymnmania_src/hymn_remaker/test_input/Emmanuel.mid">Emmanuel.mid</option>
                <option value="hymnmania_src/hymn_remaker/test_input/God Is So Good.mid">God Is So Good.mid</option>
            </select>
        </div>

        <div class="form-group">
            <label for="vocalUrl">Vocal Track URL (Optional)</label>
            <input type="text" id="vocalUrl" placeholder="https://youtube.com/watch?v=...">
        </div>

        <div class="form-group">
            <label for="genreSelect">Target Genre</label>
            <select id="genreSelect">
                <option value="psytrance">Full-On Psytrance (145 BPM)</option>
                <option value="house">Deep House (124 BPM)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="bpm">Target BPM (Override)</label>
            <input type="number" id="bpm" value="145" min="80" max="180">
        </div>

        <details style="margin-bottom: 20px; cursor: pointer; color: #00d2ff;">
            <summary>Advanced Algorithmic Parameters</summary>
            <div class="config-section" style="background: #222;">
                <div class="form-group">
                    <label>Euclidean Density (1-8)</label>
                    <input type="range" id="density" min="1" max="8" value="5">
                </div>
                <div class="form-group">
                    <label>Octave Jump Frequency (0-4)</label>
                    <input type="range" id="octaves" min="0" max="4" value="2">
                </div>
                <div class="form-group">
                    <label>Gallop Variant</label>
                    <select id="variant">
                        <option value="classic">Classic (K-B-B-B)</option>
                        <option value="triplet">Triplet (K-X-B-B)</option>
                        <option value="rolling">Rolling (K-B-X-B)</option>
                    </select>
                </div>
            </div>
        </details>

        <button id="generateBtn">🚀 Generate Track</button>

        <div id="status" class="status" style="display:none;">
            Pipeline active. Check GitHub Actions for progress.
        </div>

        <div class="job-monitor" id="jobMonitor" style="display:none;">
            <h3>Live Job Monitor</h3>
            <div id="jobDetails">
                Status: <span id="jobStatus" class="job-status">Idle</span><br>
                <small id="jobId"></small>
            </div>
        </div>

        <div class="config-section">
            <h3>GitHub Integration Settings</h3>
            <div class="form-group">
                <input type="text" id="ghOwner" placeholder="GitHub Owner (e.g., robertpelloni)">
            </div>
            <div class="form-group">
                <input type="text" id="ghRepo" placeholder="GitHub Repo (e.g., hymnmania)">
            </div>
            <div class="form-group">
                <input type="password" id="ghToken" placeholder="GitHub Personal Access Token (classic)">
            </div>
            <button id="saveConfigBtn" style="background: #444; font-size: 12px; padding: 8px;">Save Settings</button>
        </div>

        <div class="output" id="outputSection" style="display:block;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h3 style="margin: 0;">Published Tracks</h3>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="searchInput" placeholder="Search tracks..." style="width: 200px; padding: 5px;">
                    <select id="genreFilter" style="width: 120px; padding: 5px;">
                        <option value="">All Genres</option>
                        <option value="Psytrance">Psytrance</option>
                        <option value="House">House</option>
                    </select>
                    <select id="sortBy" style="width: 120px; padding: 5px;">
                        <option value="newest">Newest</option>
                        <option value="bpm">BPM</option>
                        <option value="key">Key</option>
                        <option value="title">Title</option>
                    </select>
                </div>
            </div>
            <div id="tracksList">
                <p>Loading manifest...</p>
            </div>
        </div>
    </div>

    <script>
        let allTracks = [];

        async function loadManifest() {
            try {
                const response = await fetch('published/manifest.json');
                if (!response.ok) throw new Error('Manifest not found');
                allTracks = await response.json();
                renderTracks();
            } catch (e) {
                document.getElementById('tracksList').innerHTML = '<p>No published tracks yet.</p>';
            }
        }

        function renderTracks() {
            const list = document.getElementById('tracksList');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const genreFilter = document.getElementById('genreFilter').value;
            const sortMode = document.getElementById('sortBy').value;

            let filtered = allTracks.filter(t => {
                const matchesSearch = t.title.toLowerCase().includes(searchTerm) || t.key.toLowerCase().includes(searchTerm);
                const matchesGenre = genreFilter === "" || t.genre === genreFilter;
                return matchesSearch && matchesGenre;
            });

            filtered.sort((a, b) => {
                if (sortMode === 'bpm') return a.bpm - b.bpm;
                if (sortMode === 'title') return a.title.localeCompare(b.title);
                if (sortMode === 'key') return a.key.localeCompare(b.key);
                if (sortMode === 'newest') return new Date(b.publishedAt || 0) - new Date(a.publishedAt || 0);
                return 0;
            });

            list.innerHTML = '';
            if (filtered.length === 0) {
                list.innerHTML = '<p>No matching tracks found.</p>';
                return;
            }

            filtered.forEach(track => {
                const div = document.createElement('div');
                div.className = 'track';
                const tech = track.technical ?
                    ` | ${Math.round(track.technical.duration)}s | ${track.technical.format}` : '';
                const streaming = track.streamingUrls ?
                    Object.entries(track.streamingUrls).map(([p, url]) => `<a href="${url}" target="_blank" style="margin-left: 10px; font-size: 12px; color: #ff0000;">📺 ${p}</a>`).join('') : '';
                const cloudBadge = track.remoteUrl ? `<span style="margin-left: 10px; font-size: 10px; background: #4caf50; color: white; padding: 2px 5px; border-radius: 4px;">☁️ Cloud</span>` : '';
                const downloadUrl = track.remoteUrl || `published/${track.fileName}`;

                let artifactLinks = '';
                if (track.artifacts) {
                    if (track.artifacts.midi) artifactLinks += `<a href="registry/${track.artifacts.midi}" target="_blank" style="margin-left: 10px; font-size: 11px; color: #00d2ff;">🎹 MIDI</a>`;
                    if (track.artifacts.video) artifactLinks += `<a href="registry/${track.artifacts.video}" target="_blank" style="margin-left: 10px; font-size: 11px; color: #00d2ff;">🎬 Video</a>`;
                    if (track.artifacts.stems) artifactLinks += `<span style="margin-left: 10px; font-size: 11px; color: #aaa;">📦 Stems</span>`;
                }

                div.innerHTML = `
                    <div style="flex: 1;">
                        <strong>${track.title}</strong> (${track.genre}) ${cloudBadge}<br>
                        <small>${track.bpm} BPM | ${track.key} | v${track.version}${tech}</small><br>
                        ${streaming} ${artifactLinks}
                    </div>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <div class="feedback-btns">
                            <button onclick="openFeedbackModal('${track.fileName}', 'up')" style="padding: 5px 10px; font-size: 14px; background: #444; width: auto;">👍</button>
                            <button onclick="openFeedbackModal('${track.fileName}', 'down')" style="padding: 5px 10px; font-size: 14px; background: #444; width: auto;">👎</button>
                        </div>
                        <a href="${downloadUrl}" target="_blank" style="white-space: nowrap; background: #00d2ff; color: #1a1a1a; padding: 5px 10px; border-radius: 4px; font-weight: bold;">⬇️ Download</a>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        document.getElementById('searchInput').oninput = renderTracks;
        document.getElementById('genreFilter').onchange = renderTracks;
        document.getElementById('sortBy').onchange = renderTracks;

        async function openFeedbackModal(fileName, rating) {
            const comment = prompt(`Explain your ${rating} vote (optional):`);
            const tags = prompt(`Add tags separated by commas (e.g., "fast, groovy, thin"):`);
            sendFeedback(fileName, rating, comment, tags);
        }

        async function sendFeedback(fileName, rating, comment = "", tags = "") {
            const owner = document.getElementById('ghOwner').value;
            const repo = document.getElementById('ghRepo').value;
            const token = document.getElementById('ghToken').value;

            if (!owner || !repo || !token) {
                alert('Please configure GitHub settings to submit feedback.');
                return;
            }

            try {
                const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/actions/workflows/feedback.yml/dispatches`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify({
                        ref: 'main',
                        inputs: {
                            file_name: fileName,
                            rating: rating,
                            comment: comment,
                            tags: tags
                        }
                    })
                });

                if (res.status === 204) {
                    alert('Feedback submitted! It will be used to refine the AI in the next training cycle.');
                } else {
                    const error = await res.json();
                    alert(`Error: ${error.message}`);
                }
            } catch (e) {
                alert(`Error: ${e.message}`);
            }
        }

        window.onload = () => {
            loadManifest();
            // Load saved config
            document.getElementById('ghOwner').value = localStorage.getItem('ghOwner') || '';
            document.getElementById('ghRepo').value = localStorage.getItem('ghRepo') || '';
            document.getElementById('ghToken').value = localStorage.getItem('ghToken') || '';
        };

        document.getElementById('saveConfigBtn').onclick = () => {
            localStorage.setItem('ghOwner', document.getElementById('ghOwner').value);
            localStorage.setItem('ghRepo', document.getElementById('ghRepo').value);
            localStorage.setItem('ghToken', document.getElementById('ghToken').value);
            alert('Settings saved!');
        };

        async function monitorJob(owner, repo, token) {
            document.getElementById('jobMonitor').style.display = 'block';
            const statusEl = document.getElementById('jobStatus');
            const jobDetails = document.getElementById('jobDetails');

            const poll = async () => {
                try {
                    const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/actions/runs?event=workflow_dispatch&per_page=1`, {
                        headers: { 'Authorization': `token ${token}` }
                    });
                    const data = await res.json();
                    const latest = data.workflow_runs[0];

                    if (latest) {
                        statusEl.innerText = latest.status;
                        statusEl.className = `job-status status-${latest.status}`;

                        // Fetch steps
                        const stepsRes = await fetch(latest.jobs_url, { headers: { 'Authorization': `token ${token}` } });
                        const stepsData = await stepsRes.json();
                        const job = stepsData.jobs[0];

                        let stepText = `Run ID: ${latest.id}<br>`;
                        if (job && job.steps) {
                            const activeStep = job.steps.find(s => s.status === 'in_progress') || job.steps.reverse().find(s => s.status === 'completed');
                            if (activeStep) stepText += `<strong>Step:</strong> ${activeStep.name}`;
                        }
                        document.getElementById('jobId').innerHTML = stepText;

                        if (latest.status === 'completed') {
                            loadManifest();
                            return; // Stop polling
                        }
                    }
                } catch (e) { console.error('Monitor error:', e); }
                setTimeout(poll, 5000);
            };
            poll();
        }

        document.getElementById('generateBtn').onclick = async () => {
            const owner = document.getElementById('ghOwner').value;
            const repo = document.getElementById('ghRepo').value;
            const token = document.getElementById('ghToken').value;

            if (!owner || !repo || !token) {
                alert('Please configure GitHub settings first.');
                return;
            }

            const midi = document.getElementById('midiSelect').value;
            const vocal = document.getElementById('vocalUrl').value;
            const bpm = document.getElementById('bpm').value;
            const genre = document.getElementById('genreSelect').value;
            const density = document.getElementById('density').value;
            const octaves = document.getElementById('octaves').value;
            const variant = document.getElementById('variant').value;
            const isContinuous = midi === "";

            const status = document.getElementById('status');
            status.style.display = 'block';
            status.innerText = "Dispatching workflow...";

            try {
                const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/actions/workflows/production.yml/dispatches`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify({
                        ref: 'main',
                        inputs: {
                            input_midi: midi || 'hymnmania_src/hymn_remaker/test_input/Emmanuel.mid',
                            vocal_track: vocal,
                            genre: genre,
                            continuous: isContinuous ? "true" : "false",
                            density: density,
                            octaves: octaves,
                            variant: variant
                        }
                    })
                });

                if (res.status === 204) {
                    status.innerText = "Successfully triggered! Monitoring job...";
                    monitorJob(owner, repo, token);
                } else {
                    const error = await res.json();
                    status.innerText = `Error: ${error.message}`;
                }
            } catch (e) {
                status.innerText = `Error: ${e.message}`;
            }
        };
    </script>
</body>
</html>
